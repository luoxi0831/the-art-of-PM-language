<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工作语言润色器</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>工作语言润色器</h1>
      <p>让你的职场表达更得体</p>
    </div>

    <div class="input-section">
      <label>原始内容</label>
      <textarea class="input-textarea" id="inputText" placeholder="输入或粘贴你想润色的文字..."></textarea>
    </div>

    <div class="tone-section">
      <label>选择语境</label>
      <div class="tone-grid">
        <button class="tone-btn" data-tone="leader">对领导说</button>
        <button class="tone-btn" data-tone="colleague">对同事说</button>
        <button class="tone-btn" data-tone="business">对业务方说</button>
        <button class="tone-btn" data-tone="developer">对开发说</button>
        <button class="tone-btn" data-tone="tester">对测试说</button>
        <button class="tone-btn" data-tone="direct">直白地说</button>
      </div>
      <div class="extra-note">
        <textarea id="extraNote" rows="2" placeholder="背景吐槽（可选）：说说前因后果，比如"他已经改了3次需求了，每次都是临上线才说"，AI会结合背景帮你润色得更到位"></textarea>
      </div>
      <div class="extra-note">
        <textarea id="polishReq" rows="1" placeholder="润色要求（可选）：如"委婉一些"、"带点讽刺"、"要显得专业""></textarea>
      </div>
    </div>

    <button class="polish-btn" id="polishBtn" disabled>开始润色</button>

    <div class="result-section" id="resultSection">
      <div class="result-header">
        <span>润色结果</span>
      </div>
      <div class="result-text" id="resultText"></div>
      <div class="result-actions">
        <button class="action-btn primary" id="copyBtn">一键复制</button>
        <button class="action-btn" id="repolishBtn">重新润色</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="/src/app.js"></script>
</body>
</html>
